<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Space Craft</title>
    <style>
        body {
            margin: 0;
            font-family: Segoe UI, Arial;
            background: #050814;
            color: white;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 30px;
        }

        h1 {
            text-align: center
        }

        .section {
            margin-bottom: 30px
        }

        .bar {
            height: 10px;
            background: #222;
            border-radius: 6px;
            overflow: hidden;
        }

        .fill {
            height: 100%;
            background: #8ac926;
        }

        iframe {
            width: 100%;
            height: 420px;
            border: none;
            border-radius: 12px;
        }

        .info {
            line-height: 1.6;
            opacity: .85;
        }
    </style>
</head>

<body>
    <div class="container">

        <h1>💣 Bomb Jumper Adventure</h1>

        <!-- EMBED -->
        <div class="section">
            <iframe
                src="http://localhost/web_game/bomb-jumper-adventure/"
                width="800"
                height="600"
                style="border:none;"
                allowfullscreen>
            </iframe>
        </div>

        <!-- INFO -->
        <div class="section info">
            <strong>Engine:</strong> Phaser 3<br>
        </div>

        <!-- STATUS -->
        <div class="section">
            <p>Development Progress</p>
            <div class="bar">
                <div class="fill" style="width:70%"></div>
            </div>

            <p style="margin-top:10px">Development Difficulty</p>
            <div class="bar">
                <div class="fill" style="width:40%"></div>
            </div>
        </div>

        <a href="index.html" style="color:#8ac926">← Back to Hub</a>

    </div>
</body>

</html>
